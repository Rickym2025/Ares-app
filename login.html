<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AresAI - Autenticazione Atleta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="glass p-8 rounded-2xl w-full max-w-md text-center shadow-2xl">
        <div class="mb-6">
            <span class="text-4xl">⚡</span>
            <h1 class="text-2xl font-bold mt-2 tracking-wide text-cyan-400">AresAI</h1>
            <p class="text-slate-400 text-sm mt-1">Configurazione dell'allenamento vocale</p>
        </div>

        <!-- Box di Stato -->
        <div id="status-box" class="py-6 px-6 rounded-xl bg-slate-900/50 border border-slate-900">
            <div id="spinner" class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-cyan-500 rounded-full mb-3" role="status"></div>
            <p id="status-text" class="text-sm font-medium text-slate-300">Verifica del token di accesso in corso...</p>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SUPABASE (Utilizza le tue credenziali reali)
        const SUPABASE_URL = "https://geotspkwrfpbfuinypfw.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdlb3RzcGt3cmZwYmZ1aW55cGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjgyMDUsImV4cCI6MjA5ODkwNDIwNX0.itwiI95uu_XbWaODK5tDyjbNgWWZ6TCRqEVHLRUOt6I"; 

        async function validaAccesso() {
            const statusText = document.getElementById("status-text");
            const spinner = document.getElementById("spinner");

            // 1. Estrae il token dall'URL (?token=token_test_qr_123)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get("token");

            if (!token) {
                spinner.classList.add("hidden");
                statusText.innerText = "Nessun token rilevato. Inquadra il QR Code sul rack per accedere.";
                statusText.classList.add("text-red-400");
                return;
            }

            try {
                // 2. Interroga Supabase per trovare l'utente corrispondente al token
                const response = await fetch(`${SUPABASE_URL}/rest/v1/ares_utenti?token_accesso=eq.${token}&select=*`, {
                    method: "GET",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Errore di connessione");

                const utenti = await response.json();

                if (utenti.length === 0) {
                    spinner.classList.add("hidden");
                    statusText.innerText = "Accesso non autorizzato. Token non valido o scaduto.";
                    statusText.classList.add("text-red-400");
                    return;
                }

                // 3. Token valido: Salva i dati dell'utente in locale
                const utente = utenti[0];
                localStorage.setItem("ares_utente_id", utente.id);
                localStorage.setItem("ares_utente_nome", utente.nome);
                localStorage.setItem("ares_utente_peso", utente.peso_kg);

                statusText.innerText = `Benvenuto ${utente.nome}! Autenticazione completata.`;
                statusText.classList.add("text-emerald-400");
                spinner.classList.add("hidden");

                // 4. Reindirizza alla dashboard
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);

            } catch (error) {
                console.error(error);
                spinner.classList.add("hidden");
                statusText.innerText = "Errore di rete durante la verifica. Riprova.";
                statusText.classList.add("text-red-400");
            }
        }

        window.onload = validaAccesso;
    </script>
</body>
</html>
