<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AresAI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6 flex flex-col items-center">

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Atleta</p>
                <h1 id="welcome-title" class="text-2xl font-bold text-white">...</h1>
            </div>
            <button onclick="logout()" class="text-xs bg-slate-900 border border-slate-800 text-slate-400 px-3 py-1.5 rounded-lg hover:bg-slate-800 transition">Scollega</button>
        </div>

        <!-- Stato Allenamento con Pulsante Vapi -->
        <div class="glass p-6 rounded-2xl mb-6">
            <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-semibold px-2.5 py-1 rounded bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">Sessione Attiva</span>
                <span class="text-slate-400 text-xs">Vapi Voice Coach</span>
            </div>
            <h2 class="text-xl font-bold mb-1">Allenamento in corso</h2>
            <p class="text-sm text-slate-400 mb-4">Metti le cuffie, clicca sul pulsante in basso e inizia a parlare con Ares.</p>
            
            <!-- Pulsante Interattivo -->
            <button id="vapi-btn" onclick="toggleChiamata()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                <span>🎤</span> Avvia Allenamento Vocale
            </button>
        </div>

        <!-- Scheda Parametri Utente -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-xl">
                <p class="text-xs text-slate-400">Peso Corporeo</p>
                <p id="user-weight" class="text-lg font-bold mt-1">-- kg</p>
            </div>
            <div class="glass p-4 rounded-xl">
                <p class="text-xs text-slate-400">Accesso QR Code</p>
                <p class="text-lg font-bold mt-1 text-emerald-400">Attivo</p>
            </div>
        </div>
    </div>

    <!-- Utilizziamo type="module" per caricare Vapi nativamente come modulo ES dal CDN -->
    <script type="module">
        import Vapi from 'https://esm.sh/@vapi-ai/web';

        // Controlla se la sessione esiste
        const utenteNome = localStorage.getItem("ares_utente_nome");
        const utentePeso = localStorage.getItem("ares_utente_peso");

        if (!utenteNome) {
            // Se non è loggato, rimandalo alla pagina principale
            window.location.href = "index.html";
        } else {
            document.getElementById("welcome-title").innerText = utenteNome;
            document.getElementById("user-weight").innerText = utentePeso ? `${utentePeso} kg` : "-- kg";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        let vapiInstance = null;
        let isCalling = false;
        
        // CONFIGURAZIONE CHIAVI VAPI
        const VAPI_PUBLIC_KEY = "2c6184a3-130a-478f-9664-4781bc5a8dcc"; 
        const ASSISTANT_ID = "4d800e9c-95f0-470f-b650-879c11b96422"; 
        
        function toggleChiamata() {
            const btn = document.getElementById("vapi-btn");
            
            if (!vapiInstance) {
                // Inizializza l'SDK di Vapi caricato dal modulo
                vapiInstance = new Vapi(VAPI_PUBLIC_KEY);
                
                // Ascolta l'evento di inizio chiamata per aggiornare l'interfaccia
                vapiInstance.on('call-start', () => {
                    isCalling = true;
                    btn.innerHTML = "<span>🛑</span> Termina Allenamento";
                    btn.classList.remove("bg-cyan-500", "hover:bg-cyan-600", "text-slate-950");
                    btn.classList.add("bg-red-500", "hover:bg-red-600", "text-white");
                });
                
                // Ascolta l'evento di fine chiamata per ripristinare il pulsante
                vapiInstance.on('call-end', () => {
                    isCalling = false;
                    btn.innerHTML = "<span>🎤</span> Avvia Allenamento Vocale";
                    btn.classList.remove("bg-red-500", "hover:bg-red-600", "text-white");
                    btn.classList.add("bg-cyan-500", "hover:bg-cyan-600", "text-slate-950");
                });
            }
        
            if (!isCalling) {
                // Avvia la chiamata vocale passando l'ID dell'assistente Ares
                vapiInstance.start(ASSISTANT_ID);
            } else {
                // Interrompe la conversazione
                vapiInstance.stop();
            }
        }

        // Esponiamo le funzioni all'oggetto window per renderle accessibili dagli attributi onclick in HTML
        window.logout = logout;
        window.toggleChiamata = toggleChiamata;
    </script>
</body>
</html>
